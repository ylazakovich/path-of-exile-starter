server:
  port: 8080

spring:
  datasource:
    url: jdbc:mariadb://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/mariadb
    username: root
    password: root
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        cache:
          use_second_level_cache: true
          region:
            factory_class: org.hibernate.cache.jcache.JCacheRegionFactory

  mustache:
    check-template-location: false

vendor-recipes:
  definitions:
    - id: anima_stone
      name: The Anima Stone
      result-item-name: The Anima Stone
      ingredients:
        - Primordial Might
        - Primordial Harmony
        - Primordial Eminence
